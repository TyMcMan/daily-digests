<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Digests</title>
<style>
  :root {
    --bg: #0b0e14;
    --text: #dde5ee;
    --dim: #6e7f93;
    --line: #1c2530;
    --photon: #4fd6e3;
    --neural: #7c9cff;
    --ok: #3fdf8b; --stale: #e3b341; --dead: #f0635a;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    overflow: hidden;
  }
  /* faint scanline texture */
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,255,255,.012) 2px 4px);
  }
  .masthead {
    position: fixed; top: 0; left: 0; right: 0; z-index: 4;
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 1.4rem 2rem .9rem; border-bottom: 1px solid var(--line);
    background: linear-gradient(var(--bg) 70%, transparent);
    animation: drop .7s cubic-bezier(.2,.9,.3,1) both;
  }
  .masthead h1 {
    font-size: .95rem; font-weight: 600; letter-spacing: .35em; text-transform: uppercase;
  }
  .masthead h1 .tick { color: var(--photon); }
  .masthead .sub { font-size: .7rem; color: var(--dim); letter-spacing: .12em; }
  main { display: flex; height: 100%; padding-top: 0; }
  .panel {
    position: relative; flex: 1; display: flex; flex-direction: column;
    justify-content: center; align-items: center; gap: 1.1rem;
    text-decoration: none; color: var(--text); cursor: pointer;
    transition: flex .45s cubic-bezier(.2,.9,.3,1);
  }
  .panel:hover { flex: 1.35; }
  .panel .glow {
    position: absolute; inset: 0; opacity: .5; transition: opacity .45s;
    background: radial-gradient(ellipse 60% 45% at 50% 58%, var(--a-dim), transparent 70%);
  }
  .panel:hover .glow { opacity: 1; }
  #photonics { --a: var(--photon); --a-dim: rgba(79,214,227,.07); }
  #ai        { --a: var(--neural); --a-dim: rgba(124,156,255,.07); }
  .glyph {
    font-size: 4.6rem; line-height: 1; color: var(--a);
    text-shadow: 0 0 28px var(--a-dim), 0 0 60px var(--a-dim);
    transition: text-shadow .45s, transform .45s;
  }
  .panel:hover .glyph { transform: translateY(-4px); text-shadow: 0 0 32px color-mix(in srgb, var(--a) 35%, transparent); }
  .panel h2 {
    font-size: 1.05rem; font-weight: 600; letter-spacing: .28em; text-transform: uppercase;
  }
  .panel .desc { font-size: .72rem; color: var(--dim); letter-spacing: .06em; }
  .readout {
    display: flex; align-items: center; gap: .55rem;
    border: 1px solid var(--line); border-radius: 8px;
    padding: .5rem .9rem; font-size: .74rem; color: var(--dim);
    background: rgba(255,255,255,.015);
  }
  .lamp { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); }
  .lamp.ok    { background: var(--ok);    box-shadow: 0 0 8px var(--ok); }
  .lamp.stale { background: var(--stale); box-shadow: 0 0 8px var(--stale); }
  .lamp.dead  { background: var(--dead);  box-shadow: 0 0 8px var(--dead); }
  .readout b { color: var(--text); font-weight: 600; }
  .enter {
    font-size: .72rem; letter-spacing: .2em; color: var(--a);
    opacity: 0; transform: translateY(6px); transition: opacity .35s, transform .35s;
  }
  .panel:hover .enter { opacity: 1; transform: none; }
  /* the beam seam */
  .seam {
    width: 1px; align-self: stretch; position: relative; z-index: 2;
    background: linear-gradient(180deg, transparent, var(--photon) 35%, var(--neural) 65%, transparent);
    animation: beam 1.1s .35s cubic-bezier(.2,.9,.3,1) both;
  }
  /* load choreography */
  .panel { animation: rise .8s cubic-bezier(.2,.9,.3,1) both; }
  #photonics { animation-delay: .12s; }
  #ai { animation-delay: .22s; }
  @keyframes rise { from { opacity: 0; transform: translateY(18px); } }
  @keyframes drop { from { opacity: 0; transform: translateY(-10px); } }
  @keyframes beam { from { transform: scaleY(0); } }
  .hint {
    position: fixed; bottom: 1.1rem; left: 0; right: 0; z-index: 4;
    text-align: center; font-size: .65rem; color: var(--dim); letter-spacing: .15em;
    animation: drop 1s .6s both;
  }
  .hint kbd {
    border: 1px solid var(--line); border-radius: 4px; padding: .1rem .4rem;
    font-family: inherit; font-size: .65rem;
  }
  @media (max-width: 640px) {
    body { overflow: auto; }
    main { flex-direction: column; min-height: 100%; padding: 4.5rem 0 3rem; }
    .seam { width: auto; height: 1px; align-self: stretch;
      background: linear-gradient(90deg, transparent, var(--photon) 35%, var(--neural) 65%, transparent); }
    .panel { padding: 3rem 1rem; }
    .panel:hover { flex: 1; }
  }
</style>
</head>
<body>
<header class="masthead">
  <h1>Daily<span class="tick">/</span>Digests</h1>
  <div class="sub">nightly intelligence &middot; generated while you sleep</div>
</header>
<main>
  <a class="panel" id="photonics" href="photonics/">
    <div class="glow"></div>
    <div class="glyph">&lambda;</div>
    <h2>Photonics</h2>
    <div class="desc">optical compute &middot; PIC design &middot; EU ecosystem</div>
    <div class="readout"><span class="lamp" id="ph-lamp"></span><span id="ph-status">loading&hellip;</span></div>
    <div class="enter">press P &middot; enter &rarr;</div>
  </a>
  <div class="seam"></div>
  <a class="panel" id="ai" href="ai/">
    <div class="glow"></div>
    <div class="glyph">&nabla;</div>
    <h2>AI Research</h2>
    <div class="desc">models &middot; papers &middot; tooling</div>
    <div class="readout"><span class="lamp" id="ai-lamp"></span><span id="ai-status">loading&hellip;</span></div>
    <div class="enter">press A &middot; enter &rarr;</div>
  </a>
</main>
<div class="hint"><kbd>P</kbd> photonics &nbsp;&nbsp; <kbd>A</kbd> ai research</div>
<script src="photonics/manifest.js"></script>
<script src="ai/days.js"></script>
<script>
(function () {
  function wire(lampId, statusId, dates) {
    var lamp = document.getElementById(lampId), st = document.getElementById(statusId);
    if (!dates || !dates.length) { st.textContent = "no digests yet"; return; }
    var latest = dates.slice().sort()[dates.length - 1];
    var days = Math.round((new Date().setHours(0,0,0,0) - new Date(latest + "T00:00:00")) / 864e5);
    lamp.className = "lamp " + (days <= 0 ? "ok" : days === 1 ? "stale" : "dead");
    var rel = days <= 0 ? "today" : days === 1 ? "yesterday" : days + " days ago";
    st.innerHTML = "latest <b>" + latest + "</b> &middot; " + rel + " &middot; " + dates.length + " archived";
  }
  wire("ph-lamp", "ph-status", window.DIGEST_DATES);
  wire("ai-lamp", "ai-status", window.DIGEST_DAYS);
  addEventListener("keydown", function (e) {
    if (e.key === "p" || e.key === "P") location.href = "photonics/";
    if (e.key === "a" || e.key === "A") location.href = "ai/";
  });
})();
</script>
</body>
</html>
